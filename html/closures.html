<script>
(function() {
    var allLabels  = ['2020-01', '2020-02', '2020-03', '2020-04', '2020-05', '2020-06', '2020-07', '2020-08', '2020-09', '2020-10', '2020-11', '2020-12', '2021-01', '2021-02', '2021-03', '2021-04', '2021-05', '2021-06', '2021-07', '2021-08', '2021-09', '2021-10', '2021-11', '2021-12', '2022-01', '2022-02', '2022-03', '2022-04', '2022-05', '2022-06', '2022-07', '2022-08', '2022-09', '2022-10', '2022-11', '2022-12', '2023-01', '2023-02', '2023-03', '2023-04', '2023-05', '2023-06', '2023-07', '2023-08', '2023-09', '2023-10', '2023-11', '2023-12', '2024-01', '2024-02', '2024-03', '2024-04', '2024-05', '2024-06', '2024-07', '2024-08', '2024-09', '2024-10', '2024-11', '2024-12', '2025-01', '2025-02', '2025-03', '2025-04', '2025-05', '2025-06', '2025-07', '2025-08', '2025-09', '2025-10', '2025-11', '2025-12'];
    var allValues  = [85, 64, 88, 73, 54, 130, 75, 84, 72, 90, 67, 121, 68, 44, 91, 76, 73, 109, 57, 59, 73, 60, 90, 150, 57, 56, 91, 53, 84, 150, 83, 75, 83, 86, 79, 173, 70, 84, 114, 89, 89, 141, 90, 88, 84, 85, 76, 218, 98, 68, 124, 79, 87, 136, 107, 90, 105, 88, 96, 242, 79, 84, 120, 92, 106, 189, 84, 78, 102, 73, 59, 136];
    var hlFrom     = 50;

    var cumValues = [];
    var s = 0;
    for (var i = 0; i < allValues.length; i++) {
        s += allValues[i];
        cumValues.push(s);
    }

    var ctx = document.getElementById('closeLineChart').getContext('2d');

    var chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: allLabels,
            datasets: [{
                label: '폐업 수',
                data: allValues,
                borderWidth: 2,
                pointRadius: 2,
                pointHoverRadius: 5,
                pointBorderColor: '#fff',
                pointBorderWidth: 1.5,
                tension: 0.35,
                fill: true,
                backgroundColor: 'rgba(239,68,68,0.05)',
                segment: {
                    borderColor: function(ctx) {
                        return ctx.p0DataIndex >= hlFrom ? '#b91c1c' : 'rgba(239,68,68,0.3)';
                    },
                    borderWidth: function(ctx) {
                        return ctx.p0DataIndex >= hlFrom ? 2.5 : 1.5;
                    },
                },
                pointBackgroundColor: function(ctx) {
                    return ctx.dataIndex >= hlFrom ? '#b91c1c' : 'rgba(239,68,68,0.35)';
                },
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: { duration: 0 },
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: 'rgba(255,255,255,0.98)',
                    titleColor: '#191970',
                    bodyColor: '#ef4444',
                    borderColor: 'rgba(239,68,68,0.25)',
                    borderWidth: 1,
                    padding: 8,
                    callbacks: {
                        label: function(ctx) { return '폐업 ' + ctx.parsed.y + '개'; }
                    }
                },
                annotation: {
                    annotations: {
                        currentLine: {
                            type: 'line',
                            scaleID: 'x',
                            value: allLabels[0],
                            borderColor: '#4169e1',
                            borderWidth: 2,
                            borderDash: [4, 4],
                            label: {
                                display: true,
                                content: allLabels[0],
                                position: 'start',
                                backgroundColor: '#4169e1',
                                color: 'white',
                                font: { size: 9 },
                                padding: { x: 4, y: 2 },
                                borderRadius: 4,
                            }
                        }
                    }
                }
            },
            scales: {
                x: {
                    grid: { color: 'rgba(0,0,0,0.03)' },
                    ticks: {
                        font: { size: 8 }, color: '#bbb',
                        maxRotation: 45, autoSkip: true, maxTicksLimit: 12
                    }
                },
                y: {
                    grid: { color: 'rgba(0,0,0,0.03)' },
                    ticks: { font: { size: 9 }, color: '#bbb' },
                    beginAtZero: true
                }
            }
        }
    });

    function labelFromDate(dateStr) {
        if (!dateStr) return null;
        var parts = dateStr.replace(/[^0-9\-]/g, '').split('-');
        if (parts.length >= 2) return parts[0] + '-' + parts[1].padStart(2,'0');
        return null;
    }

    function updateIndicator(currentLabel) {
        if (!currentLabel) return;
        var idx = allLabels.indexOf(currentLabel);
        if (idx === -1) {
            for (var i = allLabels.length - 1; i >= 0; i--) {
                if (allLabels[i] <= currentLabel) { idx = i; break; }
            }
        }
        if (idx === -1) return;

        chart.options.plugins.annotation.annotations.currentLine.value = allLabels[idx];
        chart.options.plugins.annotation.annotations.currentLine.label.content = currentLabel;
        chart.update('none');

        document.getElementById('currentMonthLabel').innerText = currentLabel;
        document.getElementById('currentCount').innerText = allValues[idx] ?? '-';
        document.getElementById('cumCount').innerText = cumValues[idx].toLocaleString();
    }

    var lastLabel = null;
    function checkAndUpdate() {
        var el = document.querySelector('.timecontrol-date');
        if (!el) return;
        var label = labelFromDate(el.innerText.trim());
        if (label && label !== lastLabel) {
            lastLabel = label;
            updateIndicator(label);
        }
    }

    window.addEventListener('load', function() {
        setTimeout(function() {
            checkAndUpdate();
            var dateEl = document.querySelector('.timecontrol-date');
            if (dateEl) {
                new MutationObserver(checkAndUpdate).observe(dateEl, {
                    childList: true, subtree: true, characterData: true
                });
            }
        }, 1000);
    });

    setInterval(checkAndUpdate, 100);
})();
</script>
